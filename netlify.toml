[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/actuator/*"
  to = "http://43.205.229.211:8080/actuator/:splat"
  status = 200
  force = true
[[redirects]]
  from = "/api/*"
  to = "http://43.205.229.211:8080/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/uploads/*"
  to = "http://43.205.229.211:8080/uploads/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/ws"
  to = "http://43.205.229.211:8080/ws"
  status = 200
  force = true

[[redirects]]
  from = "/ws/*"
  to = "http://43.205.229.211:8080/ws/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(self), microphone=(self), geolocation=(self)"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'wasm-unsafe-eval' https://cdn.jsdelivr.net; script-src-elem 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; media-src 'self' blob: data: https:; connect-src 'self' https: wss:; worker-src 'self' blob:; frame-src 'self' https://maps.google.com https://www.google.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

